version: 2.0
last_updated: 2026-07-10
status: active
canonical_ids_source: config/runtime_contract.json
purpose: >
  Define evidence inputs and counterevidence for the three cumulative structural direction meters.
  These indicators are evaluated from report items and dedicated data checks; they are not single-day conclusions.

structural_indicators:
  k_shaped_ai_productivity_economy:
    label: 生產力便車無法共享的 K 型經濟
    thesis: >
      AI and automation productivity gains accrue mainly to capital owners, dominant platforms,
      large firms and high-skill workers while wages, entry-level jobs, SMEs and middle-income
      consumers receive less benefit.
    direction_values: [toward, against, mixed, insufficient]
    supporting_indicators:
      - labor_productivity_up_but_real_wages_flat_or_down
      - corporate_margin_expansion_without_wage_growth
      - layoffs_or_hiring_freeze_while_ai_capex_rises
      - junior_or_middle_skill_jobs_decline
      - ai_adoption_and_productivity_gain_concentrated_in_large_firms
      - platform_take_rates_or_data_moats_expand
      - asset_prices_rise_faster_than_labor_income
      - premium_and_value_consumption_resilient_while_middle_weakens
      - automation_reduces_headcount_without_price_or_wage_sharing
    counter_indicators:
      - broad_based_real_wage_growth
      - sme_ai_adoption_improves_margin_or_survival
      - consumer_prices_fall_from_productivity_gains
      - entry_level_and_ai_augmented_hiring_broadens
      - productivity_tools_become_cheap_and_widely_accessible
    evidence_to_seek:
      - productivity_vs_real_wages
      - labor_share_of_income
      - margins_and_ai_adoption_by_firm_size
      - entry_level_job_postings
      - small_business_surveys
      - income_segment_consumption
      - consumer_credit_stress

  ai_bubble_overinvestment:
    label: AI 泡沫 / 過度投資趨勢
    thesis: >
      AI valuations, infrastructure, data-center capex and financing may be running ahead of
      durable revenue, cash flow, utilization and broad productivity outcomes.
    direction_values: [toward, against, mixed, insufficient]
    supporting_indicators:
      - ai_capex_growth_faster_than_ai_revenue
      - data_center_debt_or_project_finance_rises
      - gpu_hbm_or_power_orders_are_pulled_forward
      - ai_equity_multiples_expand_without_cash_flow_visibility
      - depreciation_power_or_cooling_cost_pressure_rises
      - model_price_competition_compresses_margins
      - pilot_fatigue_or_unclear_enterprise_roi
      - ai_winner_trade_crowding
      - central_bank_or_regulator_financial_stability_warning
    counter_indicators:
      - ai_revenue_growth_matches_or_exceeds_capex
      - clear_enterprise_roi_retention_and_paid_adoption
      - operating_margin_expands_from_ai_products
      - data_center_utilization_remains_high
      - capex_is_funded_by_operating_cash_flow_without_leverage_stress
    evidence_to_seek:
      - hyperscaler_capex_and_ai_revenue
      - data_center_financing_terms
      - gpu_hbm_inventory_orders_and_cancellations
      - power_contracts_and_utilization
      - ai_equity_valuation_and_flow_data
      - enterprise_roi_and_renewal_data
      - inference_margin_and_pricing

  brand_market_polarization_and_true_vs_fake_segmentation:
    label: 品牌大者更大 + 小眾存活 + 中間層萎縮 + 真分眾 / 假分眾
    thesis: >
      Large brands and platforms gain scale, data, traffic and structured-catalog advantages;
      distinctive niche brands survive through identity and community; generic mid-market brands
      lose pricing power. AI may create fake segmentation when only copy, ads or recommendations
      change while product, assortment, channel and repeat behavior remain generic.
    direction_values: [toward, against, mixed, insufficient]
    supporting_indicators:
      - top_brands_or_platforms_gain_share_and_margin
      - mid_price_brands_discount_more_or_close_stores
      - tenant_mix_shifts_to_luxury_value_experience_or_destination_concepts
      - distinctive_niche_brands_show_sell_through_or_repeat_strength
      - ai_search_marketplaces_or_social_algorithms_concentrate_attention
      - private_label_or_ultra_low_price_pressure_mid_market
      - premium_and_value_outperform_the_middle
      - pseudo_personalization_rises_without_retention_or_full_price_sales
    counter_indicators:
      - mid_market_brands_regain_share_and_full_price_sell_through
      - discovery_tools_reduce_customer_acquisition_cost_for_mid_sized_brands
      - department_stores_successfully_expand_middle_market_tenants
      - personalization_improves_repeat_rate_and_margin
      - real_segmented_products_build_distinct_loyalty
    true_segmentation_indicators:
      - distinct_product_design_material_fit_or_category
      - distinct_use_case_or_occasion
      - clear_community_or_subculture_identity
      - separate_assortment_merchandising_or_channel_logic
      - different_full_price_sell_through_by_segment
      - repeat_purchase_or_membership_behavior_differs
      - brand_language_matches_product_and_customer_behavior
    fake_segmentation_indicators:
      - same_product_with_ai_generated_copy_for_many_personas
      - only_ads_prompts_recommendations_or_landing_pages_change
      - click_lift_without_repeat_or_full_price_sell_through
      - micro_segment_names_without_operational_difference
      - high_cac_and_discounting_despite_personalization
      - claimed_niche_identity_with_generic_assortment
    evidence_to_seek:
      - market_share_margin_and_discount_rate_by_brand_tier
      - store_opening_closure_and_tenant_mix
      - ai_search_social_and_marketplace_visibility
      - sell_through_inventory_age_and_repeat_by_brand_type
      - product_assortment_difference_by_segment
      - cac_retention_and_full_price_sales_by_segment

output_contract:
  required_fields:
    - indicator_id
    - direction
    - confidence
    - supporting_signal_ids
    - counter_signal_ids
    - missing_data
    - one_sentence_read
    - next_verification
  confidence_values: [high, medium, low, insufficient]
  rule: >
    All indicator IDs in config/runtime_contract.json must be present. If evidence is inadequate,
    direction and confidence are insufficient; the indicator is not omitted.

quality_gate:
  - all_runtime_indicator_ids_evaluated
  - direction_not_forced_without_evidence
  - supporting_and_counterevidence_considered
  - missing_data_and_next_verification_present
  - true_vs_fake_segmentation_evaluated_inside_brand_indicator
  - single_event_does_not_create_multiple_independent_supporting_signals
