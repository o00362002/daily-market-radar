version: 2.0
last_updated: 2026-07-10
status: active
purpose: >
  Semantic source-routing policy for radar collection. Source identity and adapters are canonical
  in config/source_registry.json; this file defines ordering, fallback, direct-channel triggers,
  Taiwan overlays and coverage-audit behavior.

applies_to:
  - AGENT_RADAR_REPORT
  - AGENT_DAILY_PUSH_BRIEF
  - AGENT_NEWS_SEARCH

required_files:
  - config/runtime_contract.json
  - config/source_registry.json
  - SOURCE_LIBRARY_SPEC.md
  - configs/query_recipes.yml
  - configs/news_freshness_and_taiwan_news.yml

source_first_rule:
  order:
    - identify_route_profile_and_canonical_domain
    - load_runtime_contract
    - validate_canonical_source_registry
    - check_source_and_adapter_health
    - collect_top_down_sources
    - collect_bottom_up_sources
    - run_fixed_query_recipes
    - cross_check_high_risk_claims
    - build_coverage_cells
    - run_generic_keyword_fallback_for_gaps_only
    - run_external_discovery_for_material_gaps
    - resolve_discovery_to_original_evidence
    - output_coverage_audit_and_gap_cards

keyword_search_role:
  allowed:
    - source_scoped_filtering
    - event_expansion
    - taiwan_direct_news_retry
    - historical_duplicate_check
    - new_source_discovery
    - failed_coverage_cell_retry
  disallowed:
    - replacing_registry_source_checks
    - replacing_direct_channel_checks
    - replacing_taiwan_news_with_implications
    - marking_coverage_complete_without_source_health
    - treating_search_result_snippets_as_final_evidence

fetch_priority:
  - official_api
  - official_rss_or_atom
  - official_newsroom_or_release_page
  - verified_media_rss_or_section_page
  - verified_data_provider
  - required_direct_social_or_channel_check
  - trusted_news_database_or_aggregator
  - external_discovery_provider
  - generic_web_search
  - unverified_community_candidate

coverage_gate:
  rule: >
    No fixed source count or news count proves completeness. Completeness is determined by
    coverage cells, source health, run budget, evidence trace, retry audit and report-contract validation.
  cells:
    - report_domain
    - macro_region
    - language
    - source_role
    - channel
    - time_window
  failure_statuses:
    - empty
    - silent_zero
    - stale
    - failing
    - policy_blocked
    - inaccessible
  on_failure:
    - run_retry_when_budget_allows
    - create_gap_card
    - mark_run_partial_when_material
    - never_translate_gap_to_no_news

coverage_audit_fields:
  required:
    - registry_checked
    - source_health_checked
    - top_down_sources_checked
    - bottom_up_sources_checked
    - source_hits
    - source_misses
    - adapter_failures
    - keyword_fallback_used
    - external_discovery_used
    - original_source_resolution_status
    - taiwan_direct_sources_checked
    - social_channels_checked_when_required
    - remaining_coverage_gaps

source_health_rules:
  track:
    - last_success_at
    - last_failure_at
    - last_empty_at
    - failure_count
    - freshness_age
    - hit_rate_by_domain
    - duplicate_rate
    - false_positive_notes
    - policy_or_access_status
  actions:
    - promote
    - demote
    - disable
    - discovery_only
    - require_runtime_reverification

hard_boundaries:
  - Taiwan implication does not count as Taiwan direct evidence.
  - Indicator status and synthesis do not count as news events.
  - Social signals remain low or medium-low evidence until verified.
  - RSSHub and FreshRSS are collection adapters, not evidence stores.
  - External discovery results must resolve to original evidence.
  - Generic search does not count as a direct social-channel check.
  - Unavailable or blocked sources create coverage gaps, not no-news claims.

mandatory_source_overlays:
  taiwan_crypto_legislative_trigger:
    applies_when:
      - domain_is_crypto_rwa_agent_payments
      - taiwan_crypto_policy_term_detected
      - taiwan_crypto_coverage_gap_exists
    priority: highest_for_taiwan_crypto_policy
    required_source_ids:
      - legislative_yuan
      - fsc_tw
      - executive_yuan_tw
      - laws_moj_tw
      - cna_tw
    additional_sources_to_register_when_verified:
      - legislative_yuan_bills
      - president_office_tw
    hard_keywords:
      - 虛擬資產服務法
      - 虛擬資產專法
      - VASP
      - 三讀
      - 金管會
      - 交易所監管
      - 穩定幣
      - 代幣化
      - 反洗錢
      - 第三方支付
      - 登記
      - 施行日期
      - 子法
    audit_requirement: >
      If Taiwan crypto policy coverage is insufficient, state whether this trigger ran,
      which official sources were checked and which were unavailable.
    classification_rule: >
      Third-reading passage is a major event. Keep third reading, promulgation, effective date
      and subordinate-rule stages as distinct event deltas.

  taiwan_crypto_fixed_sources:
    applies_when:
      - domain_is_crypto_rwa_agent_payments
      - taiwan_news_relevant
      - taiwan_crypto_coverage_gap_exists
    registry_source_ids:
      - cryptocity_tw
      - blocktrend_tw
    social_first_probes_pending_verified_canonical_urls:
      - source_id: da_trader_alliance_tw
        name: DA 交易者聯盟
        direct_channel_required: true
        evidence_default: medium_low
      - source_id: bonnie_blockchain_tw
        name: 邦妮區塊鏈
        direct_channel_required: true
        evidence_default: medium_low
    rule: >
      CryptoCity and Blocktrend use canonical registry identities. DA and Bonnie remain mandatory
      semantic probes but must not be added to the canonical registry until exact official public
      channel URLs are verified. Generic search alone does not count as a direct check.
    audit_requirement: >
      Report checked, unavailable and unverified fixed probes separately. Do not claim no Taiwan
      crypto news when a required direct channel was not checked.

  taiwan_brand_management_sources:
    applies_when:
      - domain_is_retail_consumer_fashion
      - taiwan_brand_or_management_context_relevant
      - official_brand_or_mall_sources_insufficient
    required_probes:
      - business_weekly_tw_brand
      - hbr_tw_brand_management
    rule: >
      Management media are context and case-analysis probes, not substitutes for brand, mall,
      department-store or official company evidence. Add them to the canonical registry only after
      canonical URL and usage-policy verification.
    audit_requirement: >
      When Taiwan retail/brand coverage remains insufficient, state whether these probes and the
      currently registered Taiwan business/fashion sources were checked.

  taiwan_retail_direct_sources:
    applies_when:
      - domain_is_retail_consumer_fashion
    registered_source_ids:
      - dgbas_tw
      - moea_tw
      - cna_tw
      - economic_daily_tw
      - commercial_times_tw
      - vogue_taiwan
    rule: >
      These sources improve baseline Taiwan coverage but do not replace direct brand, department-store,
      mall, LINE OA, Instagram or other channel-first checks when the event is channel-native.
