version: 0.1
last_updated: 2026-07-04
status: active_draft
purpose: >
  Source-first routing rules for Daily Push Brief, Full Daily Radar, and News Search Output.
  This config makes fixed source-library checks mandatory before broad keyword fallback.

applies_to:
  - AGENT_RADAR_REPORT
  - AGENT_DAILY_PUSH_BRIEF
  - AGENT_NEWS_SEARCH

required_files:
  - SOURCE_LIBRARY_SPEC.md
  - sources/key_media_library.yml
  - sources/official_and_data_sources.yml
  - configs/source_strategy.md
  - configs/news_freshness_and_taiwan_news.yml

source_first_rule:
  summary: >
    Before generic web search, load relevant source-library files and check priority sources
    for the requested domain, region, and language.
  order:
    - identify_route_and_domain
    - load_source_routing_rules
    - load_relevant_source_library
    - collect_priority_sources
    - classify_source_hits
    - run_source_scoped_keyword_filter
    - cross_check_with_official_or_data_sources
    - run_generic_keyword_fallback_if_needed
    - run_external_discovery_if_coverage_gap_remains
    - output_or_record_coverage_audit

keyword_search_role:
  allowed:
    - source_scoped_filtering
    - event_expansion
    - taiwan_news_gap_retry
    - historical_duplicate_check
    - new_source_discovery
    - fallback_when_priority_sources_are_empty
  disallowed:
    - replacing_priority_source_checks
    - replacing_taiwan_news_with_taiwan_implications
    - using_search_results_without_source_type_labels
    - marking_coverage_complete_without_source_audit

fetch_priority:
  - official_api
  - official_rss_or_atom
  - official_newsroom_or_release_page
  - verified_media_rss_or_section_page
  - trusted_news_database_or_aggregator
  - generic_web_search
  - social_or_community_candidate

per_domain_minimum_source_mix:
  daily_push_brief:
    global_media_minimum: 3
    taiwan_media_minimum: 1
    official_or_data_source_minimum: 1
    keyword_fallback_required_when_hits_below_target: true
  full_daily_radar:
    global_media_minimum: 5
    taiwan_media_minimum: 2
    official_or_data_source_minimum: 2
    keyword_fallback_required_when_hits_below_target: true
    external_discovery_required_when_5_plus_3_not_met: true
  news_search_output:
    global_media_minimum: 2
    taiwan_media_minimum_when_relevant: 1
    official_or_data_source_minimum_when_high_risk: 1
    keyword_fallback_required_when_hits_below_target: true

coverage_audit_fields:
  required:
    - source_library_checked
    - priority_sources_checked
    - source_hits
    - source_misses
    - keyword_fallback_used
    - official_or_data_crosscheck_used
    - taiwan_sources_checked_when_relevant
    - external_discovery_used_when_needed
    - remaining_source_gap
  allowed_values:
    source_library_checked: [yes, partial, no]
    keyword_fallback_used: [yes, no]
    official_or_data_crosscheck_used: [yes, partial, no, not_required]
    remaining_source_gap: [none, partial, material]

source_health_rules:
  track_after_execution:
    - last_success_at
    - last_empty_at
    - fail_count
    - hit_rate_by_domain
    - duplicate_rate
    - false_positive_notes
    - usage_policy_notes
  storage_candidates:
    - memory/source_health_log.json
    - memory/topic_coverage_log.json
    - reports/backtests/
  escalation:
    demote_source_when:
      - repeated_fetch_failure
      - repeated_low_quality_hits
      - unclear_usage_policy_for_automation
      - content_farm_or_low_originality_pattern
    promote_source_when:
      - repeated_early_signal_hits
      - high_original_reporting_rate
      - strong_taiwan_direct_news_coverage
      - reliable_official_or_data_trace

completion_gate_patch:
  daily_push_brief:
    must_include_or_internally_satisfy:
      - source_library_checked
      - six_domains_checked_against_source_library
      - keyword_fallback_disclosed_when_used
      - material_source_gap_disclosed
  full_daily_radar:
    must_include:
      - source_library_coverage_matrix
      - priority_source_check_summary
      - source_gap_and_retry_notes
      - external_discovery_note_when_5_plus_3_not_met
  news_search_output:
    must_include_or_disclose:
      - relevant_source_library_checked
      - checked_sources_or_source_types
      - checked_keywords
      - remaining_gap

hard_boundaries:
  - Indicator status and synthesis do not count as news.
  - Taiwan implications do not count as Taiwan news.
  - Social signals are candidates only unless verified by stronger source types.
  - Paid or restricted sources can be listed as watchlist items, but automated use requires policy check.
  - Generic web search is fallback, not the primary evidence base.

mandatory_source_overlays:
  taiwan_crypto_sources:
    applies_when:
      - domain_is_crypto_rwa_agent_payments
      - taiwan_news_required_or_taiwan_mapping_relevant
      - crypto_segment_has_taiwan_gap
    rule: >
      Taiwan crypto coverage must not rely only on global crypto media or generic search.
      These Taiwan-focused crypto sources must be checked as fixed-source probes before
      declaring Taiwan crypto news insufficient.
    sources:
      - source_id: da_trader_alliance_tw
        name: DA 交易者聯盟
        source_type: taiwan_crypto_community_media
        evidence_default: medium_low
        use_for: [trader_sentiment, taiwan_crypto_discussion, market_narrative, education]
        verification_rule: cross_check_with_official_or_data_sources_for_major_claims
        fetch_method: fixed_source_direct_check
      - source_id: bonnie_blockchain_tw
        name: 邦妮區塊鏈
        source_type: taiwan_crypto_media_or_education
        evidence_default: medium_low
        use_for: [taiwan_crypto_education, market_events, exchange_discussion, community_topics]
        verification_rule: cross_check_with_official_or_data_sources_for_major_claims
        fetch_method: fixed_source_direct_check
      - source_id: cryptocity_tw
        name: 加密城市
        source_type: taiwan_crypto_media
        evidence_default: medium
        use_for: [crypto_news, taiwan_crypto_market, regulation, exchanges, projects]
        verification_rule: cross_check_with_fsc_exchange_project_or_company_official_sources
        fetch_method: fixed_source_direct_check
      - source_id: blocktrend_tw
        name: 區塊勢
        source_type: taiwan_crypto_analysis_media
        evidence_default: medium
        use_for: [web3_trends, policy_context, crypto_business_models, structural_analysis]
        verification_rule: treat_analysis_as_context_unless_original_sources_are_cited
        fetch_method: fixed_source_direct_check
    audit_requirement: >
      If Taiwan crypto news is marked insufficient, coverage audit must say whether these
      four sources were checked. If not checked, write: Taiwan crypto fixed sources not checked.

  taiwan_brand_management_sources:
    applies_when:
      - domain_is_retail_consumer_social_fashion
      - taiwan_brand_or_management_context_relevant
      - brand_sources_required
    rule: >
      Taiwan brand coverage must include management and business media sources when official
      brand, mall, or department store sources are insufficient. These sources are not substitutes
      for official brand announcements, but they are required probes for brand strategy,
      consumer insight, retail cases, and management interpretation.
    sources:
      - source_id: business_weekly_tw_brand
        name: 商業周刊 / Business Weekly Taiwan
        source_type: taiwan_business_media
        evidence_default: medium
        use_for: [brand_strategy, retail_cases, consumer_trends, taiwan_business_context]
        verification_rule: commentary_or_case_analysis_not_standalone_fact
        fetch_method: fixed_source_direct_check
      - source_id: hbr_tw_brand_management
        name: HBR 哈佛商業評論繁體中文版
        source_type: taiwan_management_media
        evidence_default: medium
        use_for: [brand_management, retail_strategy, ai_adoption, consumer_behavior, management_framework]
        verification_rule: management_opinion_or_case_requires_original_data_for_high_evidence
        fetch_method: fixed_source_direct_check
    audit_requirement: >
      If Retail / Brand Sources are marked insufficient, coverage audit must say whether
      商業周刊 and HBR 哈佛商業評論 were checked as Taiwan brand-management probes.
