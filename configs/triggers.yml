# Cross-domain Triggers
# 每日除了類別雷達之外，必須用這些觸發器重新掃描新聞與資料。

triggers:
  - id: workflow_replacement
    name: 工作流替代
    question: AI 或新技術是否開始取代某產業完整流程？
    examples:
      - 影視製作流程被 AI 影片工具壓縮
      - 客服流程由 AI agent 接管
      - BI / 營運報表由自然語言 agent 自動產出
    required_checks:
      - 技術突破
      - 產業流程壓縮
      - 就業證據
      - 成本壓縮
      - 平台政策
      - 法律反彈

  - id: platform_policy_change
    name: 平台政策變化
    question: 補貼、分潤、流量、API、審核、佣金是否改變？
    examples:
      - Creator monetization policy
      - E-commerce commission change
      - API pricing / access change
      - App store / short video platform review policy
      - AI product usage limit / quota / rate limit change
      - Token / credit / promo code / gift code / transfer rule change

  - id: employment_skill_change
    name: 就業 / 職能變化
    question: 是否有裁員、招聘下降、新職位、薪資變化、工作量下降？
    output_mode: indicator_only_unless_independently_material
    indicator_target: configs/indicator_tracking.yml#labor_consumption_pressure
    consumes_news_slot: false
    examples:
      - 初階白領職缺下降
      - 影片後製、設計、客服、內容職能需求下降
      - AI operator / agent manager 等新職位出現
    promotion_rule: >
      預設只更新勞動與消費壓力指標。只有事件本身獨立符合 AI、全球市場、零售或科技重大新聞門檻，
      才依該 canonical primary domain 輸出一次；不得建立勞動力新聞章節。

  - id: cost_structure_change
    name: 成本結構變化
    question: 是否有原本高成本流程被壓縮 50% 以上？
    examples:
      - 廣告素材製作成本下降
      - 短劇 / 影視製作成本下降
      - 軟體開發 MVP 成本下降
      - 客服與營運流程成本下降
      - Coding agent token cost / overage cost / free credit subsidy changes development economics

  - id: commercial_loop_formation
    name: 商業閉環形成
    question: 是否形成工具 + 平台 + 分發 + 收費 / 廣告 / 金流的閉環？
    examples:
      - AI 工具產生內容，平台分發，廣告或交易變現
      - Agent 代操搜尋、推薦、下單、付款
      - Tokenized assets + exchange + liquidity + secondary trading
      - AI coding product uses token / credit economy to drive user acquisition, retention, gifting, promotion, or enterprise adoption

  - id: supply_chain_bottleneck
    name: 供應鏈瓶頸
    question: 算力、晶片、能源、物流、材料是否變成限制？
    examples:
      - GPU / HBM 短缺
      - 資料中心電力限制
      - 海運與物流延誤
      - 特定材料價格異常
      - AI agent usage cap caused by inference cost, GPU capacity, or token burn rate

  - id: consumer_behavior_shift
    name: 消費行為轉移
    question: 搜尋、購買、內容、社群互動是否轉移？
    examples:
      - social search 取代傳統搜尋
      - live commerce 流量轉移
      - 消費者轉向低價平台
      - AI 內容造成信任折損
      - Developers or creators change tool choice because token / credit / quota economics change

  - id: regulation_legal_backlash
    name: 監管 / 法律反彈
    question: 版權、隱私、金融、勞動、平台治理是否出現反制？
    examples:
      - AI 版權訴訟
      - 金融監管收緊
      - 平台演算法透明度要求
      - 勞動替代引發政策反彈
      - AI product token / account / credit abuse, stolen token, fraud, or transferable-credit risk

  - id: ai_product_economics
    name: AI 產品用量經濟
    question: AI 產品是否出現 token、credit、quota、usage limit、pricing、promo code、gift / transfer、free trial、enterprise subsidy 或 overage cost 變化？
    examples:
      - Codex token / credit promo code
      - Codex / Claude Code usage limits
      - OpenAI / Anthropic enterprise free trial
      - AI coding agent overage pricing
      - tokenmaxxing / AI agent token burn
      - transferable credits / gifted tokens / promo campaigns
    required_checks:
      - 官方公告 / Help Center / Release Notes / Status
      - 權威媒體或公司主管公開說法
      - 社群截圖或使用者回報是否只是低證據
      - 是否影響用戶遷移、工具選擇、企業導入或成本結構

escalation_rules:
  - 若同一事件命中 3 個以上觸發器，至少列為「候選訊號」。
  - 若同一事件命中 4 個以上觸發器，且證據強度中以上，必須列入「今日必看訊號」。
  - 若事件同時涉及 AI 工作流替代、平台政策、就業證據，必須進入硬檢查；是否輸出新聞仍依 AI／全球市場／零售／科技主領域門檻判斷，不建立 labor domain。
  - 若事件涉及台灣半導體、出口、零售、內容產業或企業導入 AI，必須同步進入台灣映射。
  - 若事件涉及 AI 產品 token、credit、quota、pricing、promo code、gift / transfer、usage limit 或 overage cost，即使不是模型能力新聞，也必須至少列入候選訊號或資料不足區。
