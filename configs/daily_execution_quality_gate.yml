version: 2.0
last_updated: 2026-07-10
status: active
purpose: >
  Semantic pre-output and post-output quality rules consumed with config/runtime_contract.json.
  This file judges freshness, duplication, potential-signal quality, Taiwan evidence and fixed panels;
  it does not define fixed-count completion.

applies_to:
  - AGENT_DAILY_PUSH_BRIEF
  - AGENT_RADAR_REPORT
  - AGENT_NEWS_SEARCH

must_read_with:
  - config/runtime_contract.json
  - config/source_registry.json
  - SYSTEM_PROMPT.md
  - DEPENDENCY_MAP.md
  - configs/niche_candidate_policy.yml
  - configs/structural_trend_indicators.yml
  - configs/source_routing_rules.yml
  - SOURCE_LIBRARY_SPEC.md

pre_draft_gate:
  required: true
  steps:
    - validate_runtime_contract
    - validate_source_registry_and_health
    - declare_ingestion_mode
    - run_recent_event_dedup_or_disclose_gap
    - assign_one_primary_domain_per_event
    - build_major_and_potential_lanes_separately
    - reject_invalid_major_items
    - reject_invalid_potential_items
    - run_retry_paths_for_material_coverage_or_novelty_gaps
    - run_taiwan_direct_source_audit
    - run_retail_fixed_matrix
    - run_crypto_fixed_matrix
    - run_structural_trend_indicator_panel
    - record_rejection_and_retry_counts

major_item_gate:
  reject_when:
    - no_today_material_delta
    - old_background_only
    - historical_replay_without_new_data_or_action
    - same_event_already_selected_in_another_domain
    - same_event_already_selected_in_potential_lane
    - synthesis_or_indicator_without_event_anchor
    - generic_taiwan_implication_used_as_direct_evidence
  primary_domain_rule: >
    One event has one primary report domain. Other domains may reference consequences in mappings,
    indicators or synthesis but may not create another report item for the same event.
  required_fields:
    - event_id
    - primary_domain
    - report_lane
    - first_seen_at
    - today_delta
    - importance_score
    - potential_score
    - confidence_score
    - evidence_links
    - counterevidence
    - uncertainties
    - next_watch

potential_item_gate:
  reject_when:
    - same_event_already_selected_in_major_lane
    - no_fresh_concrete_anchor
    - only_rephrased_major_event
    - generic_trend_commentary
    - old_research_without_new_relevance
    - unsupported_prediction
    - no_confirmation_or_invalidation_condition
    - no_next_verification
  retry_required_when:
    - potential_lane_below_slot_cap_due_to_low_novelty
    - material_potential_coverage_cell_empty_or_stale
    - candidates_are_mostly_mainstream_rewrites
  retry_paths_order:
    - startup_funding_product_launch_sources
    - research_papers_and_datasets
    - developer_tools_open_source_release_notes
    - regional_and_non_English_sources
    - social_first_and_channel_first_sources
    - hiring_and_job_posting_shifts
    - onchain_and_market_microstructure_data
    - patents_clinical_trials_regulatory_pilots
    - fashion_brand_merchandising_assortment_sources
    - Taiwan_direct_sources
    - external_discovery
  required_fields:
    - signal_id
    - event_id
    - primary_domain
    - candidate_type
    - formation_level
    - fresh_concrete_anchor
    - today_delta
    - importance_score
    - potential_score
    - confidence_score
    - what_would_confirm
    - what_would_invalidate
    - cannot_conclude
    - next_verification

Taiwan_direct_source_gate:
  rule: >
    Taiwan implication is not Taiwan direct evidence. If direct sources are not checked, expose
    an insufficient or unverified coverage cell. Do not fill a slot with generic mapping.
  required_audit_fields:
    - taiwan_qualified_item_count_after_audit
    - taiwan_direct_sources_checked
    - taiwan_source_hits
    - taiwan_source_misses
    - taiwan_keyword_fallback_used
    - taiwan_remaining_gap
  required_source_roles:
    - official_or_data
    - company_or_ir
    - business_or_industry_media
    - retail_mall_department_store_brand_official
    - social_or_channel_first_when_relevant
    - crypto_fixed_sources_when_relevant

retail_fixed_matrix:
  source: config/runtime_contract.json
  required: true
  rule: >
    Render every configured Retail key. Missing evidence is status=insufficient with a gap and
    next verification; do not omit the key.

crypto_fixed_matrix:
  source: config/runtime_contract.json
  required: true
  data_source_preferences:
    - official_exchange_or_ETF_data
    - DefiLlama
    - Token_Terminal
    - Dune_or_transparent_dashboards
    - trusted_market_data_provider
    - trusted_crypto_media_for_context
  rule: >
    Render every configured Crypto key. Price headlines alone are insufficient; quantitative
    checks or an explicit data gap are required.

structural_trend_indicator_gate:
  source: config/runtime_contract.json
  detail_policy: configs/structural_trend_indicators.yml
  required: true
  each_indicator_requires:
    - indicator_id
    - direction
    - confidence
    - supporting_signal_ids
    - counter_signal_ids
    - missing_data
    - one_sentence_read
    - next_verification
  rule: >
    Structural indicators are cumulative direction meters. Do not force a daily direction when
    supporting and counterevidence are insufficient.

post_output_backtest:
  required_fields_source: config/runtime_contract.json
  additional_fields:
    - retail_matrix_gaps
    - crypto_matrix_gaps
    - structural_thesis_evidence_change
    - true_vs_fake_segmentation_status
    - source_health_failures
    - unexecuted_adapters

completion_effect:
  if_runtime_contract_invalid: failed
  if_report_contract_invalid: failed
  if_required_gate_skipped: partial_or_failed
  if_material_coverage_gap_remains: partial
  if_taiwan_direct_check_missing: partial_and_taiwan_insufficient
  if_retry_not_run_for_material_gap: partial
  if_fixture_mode: partial_for_real_world_completeness
