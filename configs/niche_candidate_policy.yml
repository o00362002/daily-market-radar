version: 1.1
last_updated: 2026-07-07
status: active
purpose: >
  Define niche / potential candidate signals as early weak-signal reconnaissance,
  not generic trend commentary, and keep candidate quota equal to major-signal quota
  in both concise and full daily modes. Also classify candidate type and formation level.

quota_policy:
  principle: "小眾候選數量必須與大型訊號數量相同。"
  daily_push_brief:
    major_signals_per_domain: 3
    niche_candidates_per_domain: 3
    quota_name: 3_plus_3
  full_daily_radar:
    major_signals_per_domain_minimum_when_available: 5
    niche_candidates_per_domain_minimum_when_available: 5
    quota_name: 5_plus_5
  equality_rule: >
    For every domain, the target niche-candidate count equals the target major-signal count.
    If evidence or source access is insufficient, do not fabricate candidates; mark the
    candidate gap, execute retry / external discovery, and downgrade report status as required.

candidate_definition:
  summary: >
    小眾候選訊號是尚未成為主流大新聞、但可能擴大的早期弱訊號。
    它不是模型感想、空泛趨勢句、主流新聞換句話說，也不是沒有事件依據的預測。
  must_have_at_least_one_concrete_anchor:
    - specific_company_action
    - product_launch_or_experiment
    - research_paper_or_dataset
    - startup_funding_or_hiring_shift
    - developer_tool_or_open_source_adoption
    - onchain_metric_or_usage_change
    - niche_industry_media_event
    - social_or_community_signal
    - regulatory_pilot_or_local_policy_test
    - supply_chain_or_procurement_anomaly
    - patent_clinical_trial_prototype_or_pilot
    - fashion_or_style_microtrend_signal
    - brand_merchandising_or_assortment_shift
  preferred_properties:
    - not_yet_mainstream_headline
    - cross_domain_amplification_potential
    - observable_next_step_metric
    - asymmetric_upside_or_structural_change_potential
    - early_stage_uncertainty_explicitly_disclosed

candidate_taxonomy:
  required: true
  candidate_type:
    new_domain:
      label: 新領域
      definition: >
        A new or newly important market / technology / consumer / regulatory arena is emerging.
        Example: a new market category, new asset class, new retail format, new fashion channel,
        new consumer occasion, or new institutional activity space.
    new_application:
      label: 新應用
      definition: >
        Existing technology, product, platform, capital, retail format or consumer behavior is being
        applied to a new workflow, scene, product category, store format, fashion use case or business process.
    new_concept:
      label: 新概念
      definition: >
        A new narrative, framing, vocabulary, design language, consumption logic, operating model,
        fashion/style concept or investment thesis is appearing before widespread adoption.
    new_trend:
      label: 新趨勢
      definition: >
        Multiple signals are starting to point in the same direction across companies, markets,
        consumers, sources, social channels, funding, product launches or data.
  allow_multiple_types: true
  output_rule: >
    Each candidate must include candidate_type. Multiple types are allowed when appropriate,
    e.g. 新應用 + 新趨勢, or 新概念 + 新領域.

formation_level:
  required: true
  levels:
    weak_signal:
      label: 弱訊號
      criteria:
        - one_or_few_concrete_anchors
        - limited_reporting
        - early_discussion_or_experiment
        - evidence_low_to_medium
      output_note: "只能列候選，不得寫成趨勢已形成。"
    topic_formation:
      label: 話題形成
      criteria:
        - multiple_reports_or_social_discussions
        - repeated_mentions_across_sources
        - still_more_talk_than_application
        - evidence_medium_or_mixed
      output_note: "若很多報導或討論都指向同一現象，註明為話題形成。"
    trend_formation:
      label: 趨勢形成
      criteria:
        - multiple_companies_or_regions_start_applying
        - product_launches_or_pilots_are_repeated
        - funding_hiring_supply_chain_or_usage_data_start_to_align
        - evidence_medium_to_high
      output_note: "若很多開始應用、試點、投資、招聘或數據同步出現，註明為趨勢形成。"
    mainstreaming:
      label: 主流化中
      criteria:
        - covered_by_major_media_and_industry_media
        - clear_commercialization_or_policy_adoption
        - repeated_real_world_usage
        - measurable_data_available
      output_note: "若已主流化，應考慮升級為大型訊號，而不是保留為小眾候選。"
  escalation_rule: >
    A candidate can move from 弱訊號 → 話題形成 → 趨勢形成 → 大型訊號.
    Many reports alone usually indicate 話題形成. Many actual applications, pilots,
    company actions, investment, hiring, usage or supply-chain changes indicate 趨勢形成.

invalid_candidates:
  - generic_trend_statement_without_event
  - model_opinion_without_source
  - mainstream_major_signal_rephrased_as_candidate
  - old_background_concept_without_today_new_information
  - Taiwan_implication_without_Taiwan_event
  - unsupported_prediction
  - vague_statement_such_as_regulation_remains_a_variable

required_candidate_fields:
  - id
  - candidate_signal
  - candidate_type
  - formation_level
  - concrete_anchor
  - today_new_information
  - source_and_time
  - why_niche_or_early
  - why_it_could_scale
  - evidence_level
  - historical_duplication_status
  - uncertainty
  - cannot_conclude
  - next_verification
  - Taiwan_news_or_mapping_when_relevant

formation_evidence_rules:
  topic_formation:
    must_note_when:
      - many_reports_related
      - repeated_media_or_social_mentions
      - narrative_or_keyword_is_spreading
    cannot_claim:
      - real_adoption_is_broad
      - trend_has_formed
      - business_impact_is_confirmed
  trend_formation:
    must_note_when:
      - many_applications_or_pilots
      - repeated_company_actions
      - funding_hiring_usage_or_supply_chain_data_aligns
      - multi_region_or_multi_category_development
    cannot_claim:
      - mature_market_without_hard_data
      - universal_adoption
      - profitability_or_roi_without_evidence

source_expansion:
  required_source_types:
    - research_papers
    - startup_and_funding_sources
    - product_release_notes
    - niche_industry_media
    - developer_communities
    - official_social_channels
    - hiring_and_job_postings
    - onchain_and_market_data
    - patents_and_clinical_trials
    - regional_and_non_English_sources
    - fashion_media_and_style_platforms
    - brand_official_channels
    - runway_trend_reports_and_retail_assortment_sources
  rule: >
    Mainstream wires alone are insufficient for niche-candidate completion.
    Candidate search must expand beyond Reuters/AP-style headline coverage.

retry_rule:
  when_candidate_quota_not_met:
    - check_fixed_niche_sources
    - check_non_English_and_regional_sources
    - check_research_and_product_sources
    - check_social_first_sources_when_required
    - check_fashion_style_brand_and_retail_assortment_sources_when_relevant
    - run_cross_domain_trigger_search
    - run_external_discovery
    - record_remaining_gap
  no_fabrication: true

quality_gate:
  - candidate_count_equals_major_target_or_gap_disclosed
  - each_candidate_has_concrete_anchor
  - each_candidate_has_candidate_type
  - each_candidate_has_formation_level
  - each_candidate_explains_why_niche_or_early
  - each_candidate_explains_why_it_could_scale
  - each_candidate_states_cannot_conclude
  - each_candidate_has_next_verification
  - topic_formation_vs_trend_formation_distinguished
  - mainstream_headline_rephrasing_rejected
