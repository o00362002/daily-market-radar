version: 2.0
last_updated: 2026-07-10
status: active
purpose: >
  Define the potential-signal lane as source-backed early reconnaissance. Potential signals are
  independent from major signals and are selected by future option value, not by a fixed-count quota.

lane_policy:
  major_lane: important_now
  potential_lane: future_option_value
  confidence_dimension: independent_evidence_strength
  rules:
    - one_event_cannot_fill_both_major_and_potential_lanes
    - one_event_has_one_primary_report_domain
    - slot_caps_are_readability_limits_not_completeness_proof
    - missing_qualified_potential_signal_creates_gap_card
    - never_fabricate_or_rephrase_major_news_to_fill_a_slot
  profile_caps_source: config/runtime_contract.json

candidate_definition:
  summary: >
    A potential signal is not yet a mainstream major event but has a concrete early anchor and
    measurable path by which it could scale. It is not model opinion, generic trend commentary,
    unsupported prediction, old background knowledge or a rewrite of a major event.
  fresh_concrete_anchor_required: true
  accepted_anchor_types:
    - specific_company_action
    - product_launch_or_experiment
    - research_paper_or_dataset
    - startup_funding_or_hiring_shift
    - developer_tool_or_open_source_adoption
    - onchain_metric_or_usage_change
    - niche_industry_event
    - social_or_community_signal
    - regulatory_pilot_or_local_policy_test
    - supply_chain_or_procurement_anomaly
    - patent_clinical_trial_prototype_or_pilot
    - fashion_or_style_microtrend_signal
    - brand_merchandising_or_assortment_shift
  required_properties:
    - today_material_delta
    - source_and_time
    - candidate_type
    - formation_level
    - why_niche_or_early
    - why_it_could_scale
    - uncertainty
    - what_would_confirm
    - what_would_invalidate
    - cannot_conclude
    - next_verification

candidate_taxonomy:
  required: true
  allow_multiple_types: true
  candidate_type:
    new_domain:
      label: 新領域
      definition: A newly important market, technology, consumer, regulatory or institutional arena.
    new_application:
      label: 新應用
      definition: Existing technology, product, platform or behavior applied to a new workflow or scene.
    new_concept:
      label: 新概念
      definition: A new framing, vocabulary, design language, operating model or consumption logic.
    new_trend:
      label: 新趨勢
      definition: Multiple independent adoption or behavior signals begin pointing in one direction.

formation_level:
  required: true
  levels:
    weak_signal:
      label: 弱訊號
      criteria:
        - one_or_few_concrete_anchors
        - limited_reporting
        - early_discussion_or_experiment
        - evidence_low_to_medium
      cannot_claim: trend_has_formed
    topic_formation:
      label: 話題形成
      criteria:
        - multiple_reports_or_social_discussions
        - vocabulary_or_narrative_spreading
        - more_talk_than_application
      cannot_claim: broad_real_adoption
    trend_formation:
      label: 趨勢形成
      criteria:
        - multiple_companies_regions_or_categories_applying
        - repeated_pilots_or_product_launches
        - funding_hiring_usage_or_supply_chain_data_align
      cannot_claim: mature_or_universal_adoption
    mainstreaming:
      label: 主流化中
      criteria:
        - broad_commercial_or_policy_adoption
        - repeated_real_world_usage
        - measurable_data_available
      action: consider_major_lane
  escalation_rule: >
    Many articles usually mean topic formation. Repeated applications, company actions, hiring,
    usage or supply-chain evidence support trend formation. Broad measurable adoption may move the
    event into the major lane, but the same event cannot occupy both lanes in one report.

invalid_candidates:
  - generic_trend_statement_without_event
  - model_opinion_without_source
  - mainstream_major_event_rephrased
  - old_background_without_today_material_delta
  - Taiwan_implication_without_Taiwan_direct_evidence
  - unsupported_prediction
  - vague_regulation_or_market_commentary
  - same_event_already_selected_in_major_lane

source_expansion:
  required_source_types:
    - research_papers
    - startup_and_funding_sources
    - product_release_notes
    - niche_industry_media
    - developer_communities
    - official_social_channels
    - hiring_and_job_postings
    - onchain_and_market_data
    - patents_and_clinical_trials
    - regional_and_non_English_sources
    - fashion_media_and_style_platforms
    - brand_official_channels
    - runway_trend_reports_and_retail_assortment_sources
  rule: Mainstream wires alone are insufficient for potential-signal discovery.

retry_rule:
  trigger_when:
    - potential_lane_below_slot_cap_due_to_low_novelty
    - potential_coverage_cell_empty_or_stale
    - source_role_or_region_gap_material
  paths:
    - fixed_niche_sources
    - non_English_and_regional_sources
    - research_and_product_sources
    - developer_and_open_source_sources
    - social_first_sources_when_required
    - hiring_procurement_patent_and_clinical_sources
    - fashion_style_brand_and_assortment_sources
    - onchain_and_market_microstructure_data
    - external_discovery
  after_retry:
    - keep_only_qualified_items
    - record_retry_paths
    - disclose_remaining_gap
  no_fabrication: true

quality_gate:
  - event_not_in_major_lane
  - fresh_concrete_anchor_present
  - today_material_delta_present
  - candidate_type_present
  - formation_level_present
  - source_and_evidence_trace_present
  - why_early_and_scale_path_present
  - confirmation_and_invalidation_conditions_present
  - cannot_conclude_and_next_verification_present
  - topic_vs_trend_formation_distinguished
  - low_novelty_rephrasing_rejected
