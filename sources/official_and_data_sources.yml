version: 0.1
last_updated: 2026-07-02
status: draft_seed
purpose: >
  Official, regulator, company, market, macro, chain, and data sources for cross-checking
  media signals. These sources are used to upgrade or downgrade evidence quality.

shared_rules:
  evidence_priority:
    - official_release_or_dataset
    - regulator_or_exchange
    - company_ir_or_product_release
    - audited_or_methodologically_clear_data
    - trusted_media_summary
    - social_or_unverified_candidate
  use_cases:
    - verify_high_risk_claims
    - confirm_today_new_information
    - track_fixed_indicators
    - avoid_news_only_synthesis

sources:
  macro_markets:
    - source_id: fred
      name: FRED Federal Reserve Economic Data
      region: US
      languages: [en]
      source_type: macro_data
      domains: [macro, rates, labor, inflation, credit]
      priority: high
      evidence_default: high
      fetch_method: api_or_site
      homepage_url: https://fred.stlouisfed.org/
      usage_policy: check_required
      freshness_expectation: varies_by_series
    - source_id: bls
      name: U.S. Bureau of Labor Statistics
      region: US
      languages: [en]
      source_type: official_statistics
      domains: [labor, inflation, wages, jobs]
      priority: high
      evidence_default: high
      fetch_method: official_release_or_api
      homepage_url: https://www.bls.gov/
      usage_policy: check_required
