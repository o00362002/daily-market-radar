version: 0.1
last_updated: 2026-07-07
status: active_draft
purpose: >
  Track promoted long-term sources before every source has a verified feed/API/RSSHub route.
  This bridges source promotion and OPML enablement.

promotion_boundary:
  source_promoted_to_watchlist: source should be checked regularly by source library or query workflow
  enabled_for_opml: source has verified RSS/Atom/API/RSSHub route and can be imported into FreshRSS
  weak_signal_cluster: theme should be watched, but not treated as a single trusted source

