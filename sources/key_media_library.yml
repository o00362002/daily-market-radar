version: 0.1
last_updated: 2026-07-02
status: draft_seed
purpose: >
  Fixed key media library for source-first radar search. This file gives each radar
  domain a stable set of global and Taiwan media sources before keyword fallback.

schema_note: >
  Feed URLs, usage policy, and source health require verification before automated
  commercial use. Use `check_required` when a source is useful but the exact feed/API
  or license is not confirmed.

shared_rules:
  fetch_priority:
    - rss_or_api
    - official_section_page
    - site_search
    - trusted_news_database
    - generic_web_search_fallback
  evidence_note:
    - news_agency_and_major_financial_media_are_usually_high_or_medium_high
    - industry_media_are_usually_medium
    - commentary_columns_are_not_standalone_facts
    - social_sources_are_low_evidence_candidates_only

