external_discovery_sources:
  - source_id: gdelt
    name: GDELT Project
    source_type: global_news_database
    region: Global
    languages: [multi]
    domains: [all]
    priority: fallback_high
    evidence_default: discovery_only
    fetch_method: api_or_bigquery
    homepage_url: https://www.gdeltproject.org/
    usage_policy: check_required
    notes: Use for global multilingual discovery and coverage-gap scanning, not as a replacement for source verification.
  - source_id: mediacloud
    name: Media Cloud
    source_type: media_research_database
    region: Global
    languages: [multi]
    domains: [media_analysis, source_discovery]
    priority: fallback_medium
    evidence_default: discovery_only
    fetch_method: api_check_required
    homepage_url: https://www.mediacloud.org/
    usage_policy: check_required
  - source_id: common_crawl_cc_news
    name: Common Crawl CC-News
    source_type: web_news_dataset
    region: Global
    languages: [multi]
    domains: [historical_backtest, broad_discovery]
    priority: research_low
    evidence_default: discovery_only
    fetch_method: dataset
    homepage_url: https://commoncrawl.org/
    usage_policy: check_required
    notes: Useful for research/backtest; too heavy for default daily execution.
