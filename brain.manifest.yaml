# brain.manifest.yaml — child mount (thin)
# Projection file: the source of truth remains in the mother repo.
schema: brain-manifest/v1
manifest_kind: child
mother_repo: o00362002/Human-AI-Collaboration-Brain
mother_version: v2.0-draft
mother_architecture: compact_five_layer
level: Level 2                      # legacy alias（保留向下相容）
capabilities: [entry, state, decisions, routing]
complexity_signals: [generates-output]
depth_note: recurring daily intelligence workflow with source library, report templates, memory, and routing; no cross-repo dependency depth required
mounted_since: 2026-07-05

architecture_layers:
  - Brain Core / Charter
  - Interface & Integration Layer
  - Memory Layer
  - Context Routing Layer
  - Execution Edge

mount:
  mode: thin
  role: execution_interface
  layer_depth: capability_scaled
  real_test_case: true
  test_domain: daily-market-radar
  status: active_thin_mount

contracts:
  entry_contract: AGENTS.md
  execution_contract: inherited_from_mother:rules/universal_execution_contract.md
  role_boundary_contract: inherited_from_mother:rules/role_boundary_contract.md
  folder_structure_guide: inherited_from_mother:PROJECT_FOLDER_STRUCTURE.md
  mount_depth_contract: inherited_from_mother:MOUNT_DEPTH.md
  schema_coverage_policy: inherited_from_mother:schema/INDEX.md
  flow_profile_policy: inherited_from_mother:specs/flow_selection_and_enforcement.md
  convergence_mode: inherited_from_mother

file_governance:
  core_files_define_current_state: true
  projection_files_create_no_canonical_rules: true
  evidence_files_do_not_become_memory_without_approval: true
  archive_and_frozen_history_not_current_state: true

backtest_growth_control:
  required_when_project_grows: true
  review_actions:
    - keep
    - revise
    - delete
    - archive
    - add
    - promote
    - demote
    - observe

execution_edge:
  execution_module_model: enabled_lightweight
  programmable_control_layer: enabled_lightweight
  backtest_capability: enabled_when_evidence_exists
  post_execution_backtest_to_memory: inherited_from_mother

execution_gates:
  - entry
  - dependency
  - role_boundary
  - plan
  - execution
  - post_action_check
  - reality_sync

checks:
  execution_check: EXECUTION_CHECK.md
  reality_check: bash check_mount_integrity.sh

sync_policy:
  high_level_index_check: required
  optional_adapter_check: required
  frozen_history_check: required
  auto_sync_auto_pr: not_active_check_only

boundary:
  inherits_compact_five_layer: true
  brain_never_executes: true
  interface_exposes_access_not_authority: true
  agent_cannot_approve_itself: true
  tool_without_judgement: true
  loop_handles_retry_and_backtest: true
  adoption_gate_under_interface: true
  level_is_legacy_alias: true
