# brain.manifest.yaml — machine-readable governance and runtime pointers
schema: brain-manifest/v2
manifest_kind: child
repo: o00362002/daily-market-radar
status: active

local_source_of_truth: this_repo
agent_entry: AGENTS.md
governance_owner: o00362002/brain-core

pointers:
  current_state: CURRENT_STATE.md
  current_decisions: CURRENT_DECISIONS.md
  route_registry: AGENT_DEFINITION_MAP.md
  source_contract: SOURCE_LIBRARY_SPEC.md
  query_recipes: configs/query_recipes.yml
  canonical_runtime_contract: config/runtime_contract.json
  domain_packs: domains/
  potential_pool: memory/potential_pool.md
  sync_review_edges: schema/sync-matrix.json

machine_checks:
  core:
    structural: tools/brain/check-core.js
    sync_review: tools/brain/check-sync-matrix.js
    doc_path_reality: tools/brain/check-doc-paths.js
    pre_change_confirmation: tools/brain/check-pre-change-confirmation.js
    protected_file_policy: schema/protected-files.json
  domain:
    domain_pack_integrity: tools/brain/check-domain-packs.js

execution:
  hook_installer: tools/install_hooks.sh
  integrity_entry: check_mount_integrity.sh
  routine_work: local_first

boundaries:
  local_content_source_of_truth: true
  governance_definitions_live_in_profile: true
  projections_create_no_canonical_rules: true
  evidence_requires_promotion: true
  agent_cannot_approve_itself: true
  competitor_projection_is_not_report_domain: true
  labor_is_indicator_only_by_default: true
  frozen_history_is_not_current_state: true
