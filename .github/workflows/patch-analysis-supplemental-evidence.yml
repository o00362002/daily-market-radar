name: patch-analysis-supplemental-evidence

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-analysis-supplemental-evidence.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Patch analysis page
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("web/src/pages/analysis.astro")
          text = path.read_text(encoding="utf-8")

          old_vars = "const translations: any[] = analysis?.translations ?? [];\nconst limitations: string[] = analysis?.limitations ?? [];"
          new_vars = "const translations: any[] = analysis?.translations ?? [];\nconst supplementalEvidence: any[] = analysis?.supplemental_evidence ?? [];\nconst limitations: string[] = analysis?.limitations ?? [];"
          if old_vars not in text:
              raise SystemExit("analysis variable anchor not found")
          text = text.replace(old_vars, new_vars, 1)

          anchor = '''      <details class="card" open={limitations.length > 0}>\n        <summary><strong>限制與缺口</strong></summary>'''
          section = '''      <h2>缺口補搜證據</h2>\n      <p class="muted">以下資料由 09:00 ChatGPT 缺口補搜取得，屬於 supplemental evidence，不會改寫原始 RadarReportV2、固定矩陣或 deterministic 指標。</p>\n      {supplementalEvidence.length === 0 && <p class="empty">本次沒有通過驗證的補搜證據，或正式分析仍為 deterministic fallback。</p>}\n      <div class="summary-grid">\n        {supplementalEvidence.map((item) => (\n          <article class="card content-card">\n            <div class="row">\n              <span class={`badge ${item.evidence_grade === 'primary' ? 'fact' : item.evidence_grade === 'high_quality_secondary' ? 'deterministic' : 'uncertainty'}`}>{item.evidence_grade}</span>\n              <span class="badge auto">{item.freshness}</span>\n              {item.direct_taiwan_evidence && <span class="badge fact">台灣直接證據</span>}\n            </div>\n            <h3>{item.title}</h3>\n            <p>{item.summary}</p>\n            <p><strong>補齊缺口：</strong><code>{item.gap_ref}</code></p>\n            <p class="muted">發布：{item.published_at} · 擷取：{item.fetched_at} · 來源角色：{item.source_role}</p>\n            <p><a href={item.url} target="_blank" rel="noreferrer">開啟原始來源</a></p>\n          </article>\n        ))}\n      </div>\n\n      <details class="card" open={limitations.length > 0}>\n        <summary><strong>限制與缺口</strong></summary>'''
          if anchor not in text:
              raise SystemExit("analysis section anchor not found")
          path.write_text(text.replace(anchor, section, 1), encoding="utf-8")
          PY

      - name: Verify Astro build
        working-directory: web
        run: |
          npm ci
          npm run types:check
          npm run build

      - name: Commit page update
        run: |
          set -euo pipefail
          rm -f .github/workflows/patch-analysis-supplemental-evidence.yml
          git clean -fdx -e web/node_modules >/dev/null 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/pages/analysis.astro
          git add -u .github/workflows/patch-analysis-supplemental-evidence.yml
          git commit -m "feat: show supplemental evidence on AI analysis page"
          git pull --rebase origin main
          git push origin HEAD:main
