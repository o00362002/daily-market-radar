name: runtime-check

# Runtime CI: unit, integration, contract, architecture, migrations, schema drift,
# a deterministic no-secret run and the auto-without-key fallback. No secrets are used.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: runtime-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: make validate (unit/integration/contract/architecture + runtime-contract + cli-smoke + brain checks)
        run: make validate PYTHON=python
      - name: Deterministic run with no secrets
        env:
          OPENAI_API_KEY: ""
        run: |
          PYTHONPATH=src python -m radar.cli run-daily --date 2026-07-10 --evaluation-mode deterministic > /tmp/deterministic.json
          python -c "import json;a=json.load(open('/tmp/deterministic.json'))['evaluation_audit'];assert a['effective_mode']=='deterministic',a"
      - name: Auto mode falls back without a key
        env:
          OPENAI_API_KEY: ""
        run: |
          PYTHONPATH=src python -m radar.cli run-daily --date 2026-07-10 --evaluation-mode auto > /tmp/auto.json
          python -c "import json;a=json.load(open('/tmp/auto.json'))['evaluation_audit'];assert a['effective_mode']=='deterministic';assert 'ai_evaluation_unavailable' in a['degradation_reasons'],a"
      - name: Mount integrity
        run: bash check_mount_integrity.sh
