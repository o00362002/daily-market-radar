name: verify-analysis-readability-deploy

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/verify-analysis-readability-deploy.yml"

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify latest main deployment and public analysis page
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: f05dc624c351213bf7c455346376aa9ab4829f56
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/ai-analysis.yml/runs?branch=main&per_page=10" \
            > runs-raw.json
          jq --arg sha "$EXPECTED_SHA" '{runs: [.workflow_runs[] | select(.head_sha == $sha) | {id,event,status,conclusion,head_sha,html_url}]}' runs-raw.json > deployment-run.json
          RUN_ID=$(jq -r '.runs[0].id // empty' deployment-run.json)
          if [ -z "$RUN_ID" ]; then
            echo "No ai-analysis run found for $EXPECTED_SHA" >&2
            exit 1
          fi
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100" \
            --jq '{jobs: [.jobs[] | {name,status,conclusion,steps: [.steps[] | {name,status,conclusion}]}]}' \
            > deployment-jobs.json
          test "$(jq -r '.runs[0].conclusion' deployment-run.json)" = "success"
          test "$(jq '[.jobs[] | select(.name == "deploy" and .conclusion == "success")] | length' deployment-jobs.json)" -eq 1

          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          curl --fail --location --retry 8 --retry-delay 5 "$BASE/analysis/" -o deployed-analysis.html

          python - <<'PY'
          from pathlib import Path
          text = Path("deployed-analysis.html").read_text(encoding="utf-8")
          headings = [
              "今日統整",
              "重點判讀",
              "未來趨勢情境",
              "三個核心結構趨勢指標",
              "輔助訊號面板",
          ]
          positions = [text.index(value) for value in headings]
          assert positions == sorted(positions), positions
          assert "未來 3 個月可能性" in text
          assert "未來 6 個月可能性" in text
          assert "完整依據" in text
          assert "AI 產出履歷與稽核識別" in text
          assert text.index("AI 產出履歷與稽核識別") > text.index("輔助訊號面板")
          Path("verification-summary.txt").write_text(
              "content-first order: ok\n3-month possibility: ok\n6-month possibility: ok\nraw evidence collapsed: ok\nprovenance moved after content: ok\n",
              encoding="utf-8",
          )
          PY

          cat deployment-run.json
          cat deployment-jobs.json
          cat verification-summary.txt
      - uses: actions/upload-artifact@v4
        with:
          name: analysis-readability-deploy-verification
          path: |
            deployment-run.json
            deployment-jobs.json
            verification-summary.txt
            deployed-analysis.html
