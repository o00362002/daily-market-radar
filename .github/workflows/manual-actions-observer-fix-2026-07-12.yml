name: manual-actions-observer-fix-2026-07-12

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/manual-actions-observer-fix-2026-07-12.yml"

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Observe patch and AI analysis runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p reports/execution_checks
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?per_page=30" > /tmp/runs.json
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/runs.json').read_text())
          names={'fix-ai-structural-direction-2026-07-12','ai-analysis','manual-ai-analysis-verify-2026-07-12'}
          out=[]
          for r in data.get('workflow_runs',[]):
              if r.get('name') in names:
                  out.append({k:r.get(k) for k in ['id','name','status','conclusion','run_number','head_sha','created_at','updated_at','html_url']})
          Path('reports/execution_checks/2026-07-12_fix_and_ai_run_status.json').write_text(json.dumps(out,ensure_ascii=False,indent=2)+'\n')
          print(json.dumps(out,ensure_ascii=False,indent=2))
          PY
          rm -f .github/workflows/manual-actions-observer-fix-2026-07-12.yml
      - name: Commit status receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/execution_checks/2026-07-12_fix_and_ai_run_status.json
          git add -u .github/workflows/manual-actions-observer-fix-2026-07-12.yml || true
          git commit -m "chore: record structural direction fix workflow status"
          git pull --rebase origin main
          git push origin HEAD:main
