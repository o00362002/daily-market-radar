name: inspect-ai-analysis-deploy

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/inspect-ai-analysis-deploy.yml"

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Read recent ai-analysis workflow runs and deployed artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/ai-analysis.yml/runs?branch=main&per_page=5" \
            --jq '{runs: [.workflow_runs[] | {id, event, status, conclusion, head_sha, created_at, updated_at, html_url}]}' \
            > ai-analysis-runs.json
          cat ai-analysis-runs.json
          RUN_ID=$(jq -r '.runs[0].id // empty' ai-analysis-runs.json)
          CONCLUSION=$(jq -r '.runs[0].conclusion // empty' ai-analysis-runs.json)
          if [ -n "$RUN_ID" ]; then
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100" \
              --jq '{run_id: '"$RUN_ID"', jobs: [.jobs[] | {id, name, status, conclusion, steps: [.steps[] | {name, status, conclusion}]}]}' \
              > ai-analysis-jobs.json
            cat ai-analysis-jobs.json
          else
            echo '{"run_id":null,"jobs":[]}' > ai-analysis-jobs.json
          fi

          if [ "$CONCLUSION" = "success" ]; then
            URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/data/ai-analysis/latest.json"
            for attempt in $(seq 1 12); do
              if curl -fsSL --retry 2 "$URL" -o deployed-ai-analysis.json; then
                echo "downloaded $URL"
                jq '{analysis_id,date,source_report_id,provenance,summary_count:(.executive_summary|length),finding_count:(.key_findings|length),trend_count:(.future_trends|length),indicator_count:(.linked_indicators|length)}' deployed-ai-analysis.json
                break
              fi
              echo "Pages artifact not visible yet (attempt $attempt/12)"
              sleep 10
            done
            test -s deployed-ai-analysis.json
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-deploy-inspection
          path: |
            ai-analysis-runs.json
            ai-analysis-jobs.json
            deployed-ai-analysis.json
          if-no-files-found: ignore
