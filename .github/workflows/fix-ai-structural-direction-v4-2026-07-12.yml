name: fix-ai-structural-direction-v4-2026-07-12

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-ai-structural-direction-v4-2026-07-12.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev,ai]"

      - name: Patch normalization and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          builder = Path("src/radar/analysis/builder.py")
          text = builder.read_text(encoding="utf-8")
          anchor = '''    return mapping.get(value or "", "uncertain")\n\n\ndef _build_structural_indicators(\n'''
          replacement = '''    return mapping.get(value or "", "uncertain")\n\n\ndef _structural_direction(value: str) -> str:\n    mapping = {\n        "toward": "toward",\n        "supporting": "toward",\n        "support": "toward",\n        "against": "against",\n        "counter": "against",\n        "mixed": "mixed",\n        "insufficient": "insufficient",\n    }\n    try:\n        return mapping[value]\n    except KeyError as exc:\n        raise ValueError(f"unsupported structural indicator direction: {value}") from exc\n\n\ndef _build_structural_indicators(\n'''
          if anchor not in text:
              raise SystemExit("builder insertion anchor not found")
          text = text.replace(anchor, replacement, 1)
          old = "                direction=observation.direction,\n"
          if text.count(old) != 1:
              raise SystemExit(f"expected one direction assignment, found {text.count(old)}")
          builder.write_text(text.replace(old, "                direction=_structural_direction(observation.direction),\n", 1), encoding="utf-8")

          tests = Path("tests/unit/test_ai_analysis.py")
          text = tests.read_text(encoding="utf-8")
          old_assert = "            self.assertEqual(row.direction, original.direction)\n"
          new_assert = '''            expected_direction = {\n                "supporting": "toward",\n                "support": "toward",\n                "counter": "against",\n            }.get(original.direction, original.direction)\n            self.assertEqual(row.direction, expected_direction)\n'''
          if text.count(old_assert) != 1:
              raise SystemExit("direction assertion anchor not found")
          text = text.replace(old_assert, new_assert, 1)
          anchor = "    def test_same_report_as_previous_produces_flat_auxiliary_indicator_deltas(self) -> None:\n"
          test_case = '''    def test_structural_direction_aliases_are_normalized_at_analysis_boundary(self) -> None:\n        payload = self.report.model_dump(mode="json")\n        payload["structural_indicators"][0]["direction"] = "counter"\n        payload["structural_indicators"][1]["direction"] = "supporting"\n        report = RadarReportV2.from_payload(payload)\n\n        analysis = build_deterministic_analysis(\n            report,\n            None,\n            self.config,\n            generated_at="2026-07-10T02:00:00+00:00",\n        )\n\n        self.assertEqual(analysis.structural_indicators[0].direction, "against")\n        self.assertEqual(analysis.structural_indicators[1].direction, "toward")\n\n'''
          if anchor not in text:
              raise SystemExit("test insertion anchor not found")
          tests.write_text(text.replace(anchor, test_case + anchor, 1), encoding="utf-8")
          PY

      - name: Verify fix
        run: |
          python -m pytest -q tests/unit/test_ai_analysis.py
          python -m compileall -q src/radar/analysis src/radar/contracts

      - name: Commit, clean generated files, rebase and push
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-ai-structural-direction-2026-07-12.yml
          rm -f .github/workflows/fix-ai-structural-direction-v2-2026-07-12.yml
          rm -f .github/workflows/fix-ai-structural-direction-v3-2026-07-12.yml
          rm -f .github/workflows/fix-ai-structural-direction-v4-2026-07-12.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/radar/analysis/builder.py tests/unit/test_ai_analysis.py
          git add -u .github/workflows/fix-ai-structural-direction-2026-07-12.yml .github/workflows/fix-ai-structural-direction-v2-2026-07-12.yml .github/workflows/fix-ai-structural-direction-v3-2026-07-12.yml .github/workflows/fix-ai-structural-direction-v4-2026-07-12.yml || true
          git commit -m "fix: normalize structural directions for AI analysis"
          git reset --hard HEAD
          git clean -fd
          git pull --rebase origin main
          git push origin HEAD:main
