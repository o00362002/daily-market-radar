name: validate-chat-import-pr

on:
  pull_request:
    branches: [main]
    paths:
      - "chat-imports/2026-07-11/a0bd2c6e52826799/**"
      - ".github/workflows/validate-chat-import-pr.yml"

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Validate chat import with repository CLI
        run: |
          PYTHONPATH=src python -m radar.cli import-chat \
            --package-dir "chat-imports/2026-07-11/a0bd2c6e52826799/package" \
            --report "chat-imports/2026-07-11/a0bd2c6e52826799/RadarReportV2.json" \
            --receipt import-receipt.json
          cat import-receipt.json
      - name: Upload validation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-receipt
          path: import-receipt.json
