name: ai-analysis

# Runs after a validated daily/import deployment, and after analysis-layer code
# lands on main. Restores the same durable state, generates AIAnalysisV1, then
# redeploys the static site. Missing API credentials degrade to deterministic
# analysis instead of failing.

on:
  workflow_run:
    workflows: ["daily-intelligence", "import-chat"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - ".github/workflows/ai-analysis.yml"
      - "src/radar/analysis/**"
      - "src/radar/contracts/analysis.py"
      - "config/ai_analysis.json"
      - "web/src/pages/analysis.astro"
      - "web/src/layouts/Base.astro"
      - "web/src/lib/data.ts"
  workflow_dispatch:
    inputs:
      mode:
        description: "deterministic | auto | api-assisted"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - deterministic
          - api-assisted

concurrency:
  group: radar-daily
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.gate.outputs.deployable }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install runtime and AI dependencies
        run: python -m pip install -e ".[dev,ai]"

      - name: Restore durable validated state
        run: |
          set -e
          mkdir -p data
          if ! git ls-remote --exit-code --heads origin radar-state >/dev/null 2>&1; then
            echo "no radar-state branch available" >&2
            exit 1
          fi
          git fetch origin radar-state
          git worktree add .state origin/radar-state
          PYTHONPATH=src python -m radar.cli state restore \
            --state-root .state/state \
            --database "$PWD/data/radar.db"

      - name: Export validated report artifacts
        run: |
          PYTHONPATH=src python -m radar.cli export-web \
            --out-dir "$PWD" \
            --database "$PWD/data/radar.db" \
            --legacy-reports-dir "$PWD/reports"

      - name: Production safety gate
        id: gate
        run: |
          STATUS=$(python -c "import json;print(json.load(open('artifacts/web/v1/latest.json'))['status'])")
          MODE=$(python -c "import json;print(json.load(open('artifacts/web/v1/latest.json'))['source_audit']['ingestion_mode'])")
          if [ "$STATUS" = "failed" ] || [ "$MODE" = "fixture" ]; then
            echo "deployable=false" >> "$GITHUB_OUTPUT"
            echo "AI analysis is preview-only for failed or fixture reports"
          else
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate translation, synthesis, future trends and linked indicators
        if: steps.gate.outputs.deployable == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_ANALYSIS_MODEL: ${{ vars.OPENAI_ANALYSIS_MODEL }}
          ANALYSIS_MODE: ${{ github.event.inputs.mode || vars.RADAR_AI_ANALYSIS_MODE || 'auto' }}
        run: |
          PYTHONPATH=src python -m radar.analysis.cli \
            --database "$PWD/data/radar.db" \
            --repo-root "$PWD" \
            --output-dir "$PWD/artifacts/web/v1/ai-analysis" \
            --mode "$ANALYSIS_MODE"

      - name: Build static site
        if: steps.gate.outputs.deployable == 'true'
        working-directory: web
        env:
          RADAR_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/web/v1
          PAGES_SITE: https://${{ github.repository_owner }}.github.io
          PAGES_BASE: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run types:check
          npm run build
          mkdir -p dist/data
          cp -R "$RADAR_ARTIFACTS_DIR/." dist/data/

      - name: Upload Pages artifact
        if: steps.gate.outputs.deployable == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist  # path-ok: generated by Astro build

      - name: Workflow summary
        if: always()
        run: |
          echo "## AI analysis" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployable: \`${{ steps.gate.outputs.deployable || 'false' }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/web/v1/ai-analysis/latest.json ]; then
            python -c "import json; p=json.load(open('artifacts/web/v1/ai-analysis/latest.json'))['provenance']; print(f\"- Effective mode: \\`{p['effective_mode']}\\`\")" >> "$GITHUB_STEP_SUMMARY"
            python -c "import json; p=json.load(open('artifacts/web/v1/ai-analysis/latest.json'))['provenance']; print(f\"- Provider/model: \\`{p.get('provider') or 'deterministic'} / {p.get('model') or 'none'}\\`\")" >> "$GITHUB_STEP_SUMMARY"
            python -c "import json; p=json.load(open('artifacts/web/v1/ai-analysis/latest.json'))['provenance']; print(f\"- Fallback: \\`{p['fallback_used']}\\`\")" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    needs: build
    if: needs.build.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
