name: mount-check

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mount-check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Show runtime versions
        run: |
          python3 --version
          node --version
      - name: Install project and test dependencies
        run: python3 -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Unit tests
        run: make unit
      - name: Integration tests
        run: make integration
      - name: Contract tests
        run: make contracts
      - name: Architecture tests
        run: make architecture
      - name: Runtime contract validation
        run: make runtime-contract
      - name: Source registry and OPML validation
        run: make source-opml
      - name: CLI smoke
        run: make cli-smoke
      - name: Run mount integrity check
        run: bash check_mount_integrity.sh