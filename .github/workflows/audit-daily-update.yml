name: audit-daily-update

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/audit-daily-update.yml"

permissions:
  contents: read
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit recent daily and analysis runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p audit/logs

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/daily-intelligence.yml/runs?branch=main&per_page=30" \
            > audit/daily-runs-raw.json

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/ai-analysis.yml/runs?branch=main&per_page=30" \
            > audit/analysis-runs-raw.json

          jq '{runs: [.workflow_runs[] | {id,run_number,event,status,conclusion,created_at,updated_at,run_started_at,head_sha,html_url}]}' audit/daily-runs-raw.json > audit/daily-runs.json
          jq '{runs: [.workflow_runs[] | {id,run_number,event,status,conclusion,created_at,updated_at,run_started_at,head_sha,html_url}]}' audit/analysis-runs-raw.json > audit/analysis-runs.json

          jq -r '.runs[] | select(.conclusion != "success" and .status == "completed") | .id' audit/daily-runs.json | head -10 > audit/failed-run-ids.txt

          : > audit/failed-jobs.jsonl
          : > audit/error-snippets.txt
          while read -r run_id; do
            [ -n "$run_id" ] || continue
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
              > "audit/jobs-${run_id}.json"
            jq -c --arg run_id "$run_id" '.jobs[] | select(.conclusion != "success" and .conclusion != "skipped") | {run_id:$run_id,job_id:.id,name,status,conclusion,started_at,completed_at,failed_steps:[.steps[] | select(.conclusion == "failure") | {name,number}]}' "audit/jobs-${run_id}.json" >> audit/failed-jobs.jsonl

            jq -r '.jobs[] | select(.conclusion == "failure") | .id' "audit/jobs-${run_id}.json" | while read -r job_id; do
              [ -n "$job_id" ] || continue
              if gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
                > "audit/logs/job-${job_id}.txt" 2>/dev/null; then
                {
                  echo "===== run ${run_id} job ${job_id} ====="
                  grep -E -i -C 3 'error|failed|failure|exception|traceback|permission|denied|timed out|no such file|invalid|warning' "audit/logs/job-${job_id}.txt" | tail -120 || true
                } >> audit/error-snippets.txt
              fi
            done
          done < audit/failed-run-ids.txt

          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          daily = json.loads(Path('audit/daily-runs.json').read_text())['runs']
          analysis = json.loads(Path('audit/analysis-runs.json').read_text())['runs']
          scheduled = [row for row in daily if row['event'] == 'schedule']
          completed = [row for row in scheduled if row['status'] == 'completed']
          successes = [row for row in completed if row['conclusion'] == 'success']
          failures = [row for row in completed if row['conclusion'] != 'success']
          summary = {
              'daily_total_returned': len(daily),
              'scheduled_total': len(scheduled),
              'scheduled_completed': len(completed),
              'scheduled_success': len(successes),
              'scheduled_failure': len(failures),
              'latest_scheduled': scheduled[0] if scheduled else None,
              'latest_successful_scheduled': successes[0] if successes else None,
              'latest_failed_scheduled': failures[0] if failures else None,
              'analysis_latest': analysis[0] if analysis else None,
              'recent_scheduled': scheduled[:10],
          }
          Path('audit/summary.json').write_text(json.dumps(summary, indent=2, ensure_ascii=False) + '\n')
          PY

          cat audit/summary.json
          cat audit/failed-jobs.jsonl || true
          tail -300 audit/error-snippets.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: daily-update-audit
          path: audit
