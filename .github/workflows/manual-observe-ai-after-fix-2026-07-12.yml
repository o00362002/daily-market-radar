name: manual-observe-ai-after-fix-2026-07-12
on:
  push:
    branches: [main]
    paths: [".github/workflows/manual-observe-ai-after-fix-2026-07-12.yml"]
permissions:
  actions: read
  contents: write
jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p reports/execution_checks
          curl --fail --silent --show-error -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?per_page=20" >/tmp/runs.json
          python - <<'PY'
          import json
          from pathlib import Path
          runs=json.loads(Path('/tmp/runs.json').read_text()).get('workflow_runs',[])
          out=[{k:r.get(k) for k in ['id','name','status','conclusion','run_number','head_sha','created_at','updated_at','html_url']} for r in runs if r.get('name')=='ai-analysis']
          Path('reports/execution_checks/2026-07-12_ai_after_fix_status.json').write_text(json.dumps(out,ensure_ascii=False,indent=2)+'\n')
          PY
          rm -f .github/workflows/manual-observe-ai-after-fix-2026-07-12.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/execution_checks/2026-07-12_ai_after_fix_status.json
          git add -u .github/workflows/manual-observe-ai-after-fix-2026-07-12.yml || true
          git commit -m "chore: record AI analysis status after direction fix"
          git pull --rebase origin main
          git push origin HEAD:main
