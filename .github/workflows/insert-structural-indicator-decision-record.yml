name: insert-structural-indicator-decision-record

on:
  push:
    branches: ["feat/restore-structural-indicators-primary"]
    paths:
      - ".github/workflows/insert-structural-indicator-decision-record.yml"

permissions:
  contents: write

jobs:
  insert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/restore-structural-indicators-primary
      - name: Insert decision without replacing history
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("CURRENT_DECISIONS.md")
          text = path.read_text(encoding="utf-8")
          heading = "## 2026-07-11：三個結構主指標與六個輔助訊號分層"
          if heading in text:
              raise SystemExit(0)
          block = '''## 2026-07-11：三個結構主指標與六個輔助訊號分層

### Decision

```text
1. AI 泡沫／過度投資、AI 生產力 K 型分配、品牌兩極化＋真分眾／假分眾，是本專案三個 canonical structural indicators，也是 /analysis 的主指標層。
2. AI 應用、零售變革、Crypto／RWA、台灣曝險、跨域匯流、證據可信度六項分數，是 auxiliary signal panel，只描述每日事件動能與證據條件，不得取代三個主指標。
3. AIAnalysisV1.structural_indicators 必須逐項、依固定順序投影 RadarReportV2.structural_indicators；模型不得修改 direction、support/counter score、confidence、signal IDs、missing data 或 next verification。
4. 三個主指標資料不足時仍必須輸出 insufficient，不得省略或用六個輔助分數代填。
5. README、CURRENT_STATE、docs/structural-indicators.md、runtime contract、structural config 與網站頁面必須能以中英文名稱或 canonical ID 檢索到同一套規格。
```

### Evidence

`reports/execution_checks/2026-07-11_structural_indicator_hierarchy.md` · `docs/structural-indicators.md`

---

'''
          separator = "\n---\n"
          index = text.find(separator)
          if index < 0:
              raise SystemExit("CURRENT_DECISIONS separator not found")
          insert_at = index + len(separator)
          path.write_text(text[:insert_at] + "\n" + block + text[insert_at:].lstrip("\n"), encoding="utf-8")
          PY
      - name: Commit decision record
        run: |
          if git diff --quiet -- CURRENT_DECISIONS.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CURRENT_DECISIONS.md
          git commit -m "docs: record structural indicator hierarchy decision"
          git push origin HEAD:feat/restore-structural-indicators-primary
