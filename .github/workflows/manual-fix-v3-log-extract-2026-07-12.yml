name: manual-fix-v3-log-extract-2026-07-12

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/manual-fix-v3-log-extract-2026-07-12.yml"

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download v3 fix log
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: "86621036040"
        run: |
          mkdir -p reports/execution_checks
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/jobs/$JOB_ID/logs" -o /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          text=Path('/tmp/job.log').read_bytes().decode('utf-8-sig',errors='replace')
          lines=text.splitlines()
          markers=('CONFLICT','fatal:','error:','rejected','unable to push','cannot pull','Could not apply','##[error]')
          hits=[i for i,l in enumerate(lines) if any(m in l for m in markers)]
          start=max(0,(hits[0]-50) if hits else len(lines)-220)
          Path('reports/execution_checks/2026-07-12_fix_v3_commit_failure.txt').write_text('\n'.join(lines[start:][-260:])+'\n')
          PY
          rm -f .github/workflows/manual-fix-v3-log-extract-2026-07-12.yml
      - name: Commit receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/execution_checks/2026-07-12_fix_v3_commit_failure.txt
          git add -u .github/workflows/manual-fix-v3-log-extract-2026-07-12.yml || true
          git commit -m "chore: capture structural direction fix commit failure"
          git pull --rebase origin main
          git push origin HEAD:main
